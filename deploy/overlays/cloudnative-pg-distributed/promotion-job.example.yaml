apiVersion: batch/v1
kind: Job
metadata:
  name: aecontrol-postgres-promote-secondary
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 2100
  ttlSecondsAfterFinished: 604800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aecontrol-postgres-promoter
        app.kubernetes.io/part-of: aecontrol
    spec:
      serviceAccountName: aecontrol-postgres-promoter
      automountServiceAccountToken: true
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: promoter
          image: ghcr.io/jeremydemers/agent-eval-control-plane:0.52.0
          imagePullPolicy: IfNotPresent
          command: [/app/.venv/bin/aecontrol]
          args: [promote-replica, --json]
          env:
            - name: AECONTROL_PROMOTION_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AECONTROL_PROMOTION_TARGET_CLUSTER
              value: aecontrol-postgres-secondary
            - name: AECONTROL_PROMOTION_SOURCE_CLUSTER
              value: aecontrol-postgres
            - name: AECONTROL_PROMOTION_TOKEN_FILE
              value: /var/run/secrets/aecontrol-promotion/token
            - name: AECONTROL_PROMOTION_EXPECTED_OPERATOR_VERSION
              value: REPLACE_WITH_OPERATOR_VERSION
          volumeMounts:
            - name: promotion-token
              mountPath: /var/run/secrets/aecontrol-promotion
              readOnly: true
          resources:
            requests: {cpu: 25m, memory: 64Mi}
            limits: {cpu: 200m, memory: 192Mi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
      volumes:
        - name: promotion-token
          secret:
            secretName: aecontrol-postgres-promotion-token
            defaultMode: 0400
