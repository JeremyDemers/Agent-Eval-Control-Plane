apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: aecontrol-postgres-secondary
spec:
  description: Cross-region AgentEval PostgreSQL replica
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17-standard-trixie
  enableSuperuserAccess: false
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover
  failoverDelay: 10
  switchoverDelay: 60
  bootstrap:
    recovery:
      source: aecontrol-postgres
      database: aecontrol
      owner: aecontrol
      secret:
        name: aecontrol-postgres-app-credentials
  externalClusters:
    - name: aecontrol-postgres
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: aecontrol-postgres-primary-archive
          serverName: aecontrol-postgres
    - name: aecontrol-postgres-secondary
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: aecontrol-postgres-secondary-archive
          serverName: aecontrol-postgres-secondary
  replica:
    self: aecontrol-postgres-secondary
    primary: aecontrol-postgres
    source: aecontrol-postgres
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: aecontrol-postgres-secondary-archive
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: 256MB
    synchronous:
      method: any
      number: 1
      dataDurability: required
      failoverQuorum: true
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  resources:
    requests: {cpu: 500m, memory: 1Gi}
    limits: {cpu: "2", memory: 4Gi}
  storage:
    size: 20Gi
  walStorage:
    size: 5Gi
