apiVersion: apps/v1
kind: Deployment
metadata:
  name: bedrock-worker
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: bedrock-worker}
  template:
    metadata:
      labels: {app.kubernetes.io/name: bedrock-worker}
    spec:
      serviceAccountName: aecontrol-bedrock-worker
      terminationGracePeriodSeconds: 150
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: worker
          image: ghcr.io/jeremydemers/agent-eval-control-plane
          command:
            - uv
            - run
            - aecontrol
            - worker
            - --lease-seconds
            - "120"
            - --label
            - pool=kubernetes-bedrock
            - --label
            - runtime=aws-bedrock
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: database-url}
            - {name: AECONTROL_TENANT_ID, value: default}
            - {name: AECONTROL_BEDROCK_REGION, value: us-east-1}
            - {name: AECONTROL_BEDROCK_TIMEOUT_SECONDS, value: "120"}
            - name: AECONTROL_ARTIFACT_SIGNING_KEY_ID
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: artifact-signing-key-id}
            - name: AECONTROL_ARTIFACT_SIGNING_ALGORITHM
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: artifact-signing-algorithm}
            - name: AECONTROL_ARTIFACT_ED25519_PRIVATE_KEYS
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: artifact-ed25519-private-keys}
            - name: AECONTROL_ARTIFACT_ED25519_PUBLIC_KEYS
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: artifact-ed25519-public-keys}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          resources:
            requests: {cpu: 500m, memory: 512Mi}
            limits: {cpu: "2", memory: 2Gi}
