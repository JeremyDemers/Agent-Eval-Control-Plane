apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aecontrol-sandbox-controller
rules:
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [create, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [create, get, list, delete]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [create, delete]
