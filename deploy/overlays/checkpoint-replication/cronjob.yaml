apiVersion: batch/v1
kind: CronJob
metadata:
  name: aecontrol-checkpoint-publisher
  labels:
    app.kubernetes.io/name: aecontrol-checkpoint-publisher
    app.kubernetes.io/part-of: aecontrol
spec:
  schedule: "30 3 * * *"
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      ttlSecondsAfterFinished: 604800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: aecontrol-checkpoint-publisher
            app.kubernetes.io/part-of: aecontrol
        spec:
          serviceAccountName: aecontrol-checkpoint-publisher
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: publisher
              image: ghcr.io/jeremydemers/agent-eval-control-plane:0.51.0
              imagePullPolicy: IfNotPresent
              command: [/app/.venv/bin/aecontrol]
              args: [store, checkpoint, --s3, --retention-days, "90", --json]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: aecontrol-postgres-app
                      key: uri
                - {name: AECONTROL_TENANT_ID, value: default}
                - name: AECONTROL_ARTIFACT_SIGNING_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aecontrol-database
                      key: artifact-signing-key-id
                - name: AECONTROL_ARTIFACT_SIGNING_ALGORITHM
                  valueFrom:
                    secretKeyRef:
                      name: aecontrol-database
                      key: artifact-signing-algorithm
                - name: AECONTROL_ARTIFACT_ED25519_PRIVATE_KEYS
                  valueFrom:
                    secretKeyRef:
                      name: aecontrol-database
                      key: artifact-ed25519-private-keys
                - name: AECONTROL_ARTIFACT_ED25519_PUBLIC_KEYS
                  valueFrom:
                    secretKeyRef:
                      name: aecontrol-database
                      key: artifact-ed25519-public-keys
                - {name: AECONTROL_CHECKPOINT_S3_BUCKET, value: replace-with-primary-evidence-bucket}
                - {name: AECONTROL_CHECKPOINT_S3_REGION, value: us-east-1}
                - {name: AECONTROL_CHECKPOINT_S3_PREFIX, value: aecontrol/checkpoints}
                - {name: AECONTROL_CHECKPOINT_REPLICA_S3_BUCKET, value: replace-with-replica-evidence-bucket}
                - {name: AECONTROL_CHECKPOINT_REPLICA_S3_REGION, value: us-west-2}
                - {name: AECONTROL_CHECKPOINT_REPLICA_S3_PREFIX, value: aecontrol/checkpoints}
                - {name: AECONTROL_CHECKPOINT_REQUIRED_COPIES, value: "2"}
              resources:
                requests: {cpu: 25m, memory: 64Mi}
                limits: {cpu: 200m, memory: 192Mi}
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                readOnlyRootFilesystem: true
