apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: aecontrol-postgres-daily
spec:
  schedule: "0 0 2 * * *"
  immediate: true
  suspend: false
  backupOwnerReference: self
  target: prefer-standby
  cluster:
    name: aecontrol-postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
