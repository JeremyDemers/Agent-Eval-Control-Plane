apiVersion: apps/v1
kind: Deployment
metadata:
  name: mig-1g-10gb-worker
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: mig-1g-10gb-worker}
  template:
    metadata:
      labels: {app.kubernetes.io/name: mig-1g-10gb-worker}
    spec:
      terminationGracePeriodSeconds: 150
      nodeSelector:
        nvidia.com/mig.strategy: mixed
      tolerations:
        - {key: nvidia.com/gpu, operator: Exists, effect: NoSchedule}
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: worker
          image: ghcr.io/jeremydemers/agent-eval-control-plane
          command:
            - uv
            - run
            - aecontrol
            - worker
            - --lease-seconds
            - "120"
            - --label
            - pool=kubernetes-mig
            - --label
            - runtime=nvidia-nim
          env:
            - {name: AECONTROL_MIG_PROFILE, value: 1g.10gb}
            - name: AECONTROL_DCGM_EXPORTER_URL
              value: http://nvidia-dcgm-exporter.gpu-operator.svc.cluster.local:9400/metrics
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: database-url}
            - {name: AECONTROL_TENANT_ID, value: default}
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: nvidia-api-key}
            - name: AECONTROL_ARTIFACT_SIGNING_KEY_ID
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: artifact-signing-key-id}
            - name: AECONTROL_ARTIFACT_SIGNING_ALGORITHM
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: artifact-signing-algorithm}
            - name: AECONTROL_ARTIFACT_ED25519_PRIVATE_KEYS
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: artifact-ed25519-private-keys}
            - name: AECONTROL_ARTIFACT_ED25519_PUBLIC_KEYS
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: artifact-ed25519-public-keys}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          resources:
            requests: {cpu: "1", memory: 2Gi, nvidia.com/mig-1g.10gb: "1"}
            limits: {cpu: "4", memory: 8Gi, nvidia.com/mig-1g.10gb: "1"}
---
