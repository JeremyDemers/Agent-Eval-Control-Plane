apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-worker
spec:
  replicas: 2
  selector:
    matchLabels: {app.kubernetes.io/name: cpu-worker}
  template:
    metadata:
      labels: {app.kubernetes.io/name: cpu-worker}
    spec:
      terminationGracePeriodSeconds: 150
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: worker
          image: ghcr.io/jeremydemers/agent-eval-control-plane
          command:
            - uv
            - run
            - aecontrol
            - worker
            - --lease-seconds
            - "120"
            - --label
            - pool=kubernetes
            - --label
            - runtime=nvidia-nim
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: database-url}
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: nvidia-api-key}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          resources:
            requests: {cpu: 500m, memory: 512Mi}
            limits: {cpu: "2", memory: 2Gi}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-worker
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: gpu-worker}
  template:
    metadata:
      labels: {app.kubernetes.io/name: gpu-worker}
    spec:
      terminationGracePeriodSeconds: 150
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - {key: nvidia.com/gpu, operator: Exists, effect: NoSchedule}
      containers:
        - name: worker
          image: ghcr.io/jeremydemers/agent-eval-control-plane
          command: [uv, run, aecontrol, worker, --lease-seconds, "120", --label, pool=kubernetes-gpu]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: database-url}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          resources:
            requests: {cpu: "1", memory: 2Gi, nvidia.com/gpu: "1"}
            limits: {cpu: "4", memory: 8Gi, nvidia.com/gpu: "1"}
