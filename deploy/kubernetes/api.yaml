apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app.kubernetes.io/name: api
  ports:
    - {name: http, port: 8000, targetPort: http}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {app.kubernetes.io/name: api}
      containers:
        - name: api
          image: ghcr.io/jeremydemers/agent-eval-control-plane
          command: [uv, run, aecontrol, serve, --host, 0.0.0.0]
          ports:
            - {name: http, containerPort: 8000}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: database-url}
            - {name: AECONTROL_TENANT_ID, value: default}
            - name: AECONTROL_ARTIFACT_SIGNING_KEY_ID
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: artifact-signing-key-id}
            - name: AECONTROL_ARTIFACT_SIGNING_ALGORITHM
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: artifact-signing-algorithm}
            - name: AECONTROL_ARTIFACT_ED25519_PRIVATE_KEYS
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: artifact-ed25519-private-keys}
            - name: AECONTROL_ARTIFACT_ED25519_PUBLIC_KEYS
              valueFrom:
                secretKeyRef: {name: aecontrol-database, key: artifact-ed25519-public-keys}
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          resources:
            requests: {cpu: 200m, memory: 256Mi}
            limits: {cpu: "2", memory: 2Gi}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api
spec:
  minAvailable: 1
  selector:
    matchLabels: {app.kubernetes.io/name: api}
