name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: aecontrol
          POSTGRES_PASSWORD: aecontrol
          POSTGRES_DB: aecontrol
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aecontrol"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aecontrol:aecontrol@127.0.0.1:5432/aecontrol
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest
      - run: make demo
